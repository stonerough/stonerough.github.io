<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to Plex...</title>
</head>
<body>
  <p>Detecting your network to find the best Plex server address...</p>

  <script>
    const LOCAL_URL = "http://192.168.0.236:32400/web/index.html#!/";
    const TAILNET_URL = "http://plex.tail99c4c.ts.net:32400/web/index.html#!/";
    const FUNNEL_URL = "https://plex.tail99c4c.ts.net/web/index.html#!/";

    function redirectTo(url) {
      window.location.replace(url);
    }

    // Use an Image load to test reachability - works on all browsers including old iOS
    function testUrl(url, timeoutMs, callback) {
      var img = new Image();
      var timedOut = false;
      var timer = setTimeout(function() {
        timedOut = true;
        img.src = "";
        callback(false);
      }, timeoutMs);

      img.onload = function() {
        if (!timedOut) {
          clearTimeout(timer);
          callback(true);
        }
      };
      img.onerror = function() {
        if (!timedOut) {
          clearTimeout(timer);
          callback(true);  // onerror means the server responded (even 404) - still reachable
        }
      };

      // Append a cache-buster so we don't get cached results
      img.src = url + "?t=" + new Date().getTime();
    }

    // Try local first (short timeout), then tailnet, then funnel
    testUrl("http://192.168.0.236:32400/web/favicon.ico", 2000, function(localReachable) {
      if (localReachable) {
        redirectTo(LOCAL_URL);
        return;
      }

      testUrl("http://plex.tail99c4c.ts.net:32400/web/favicon.ico", 3000, function(tailnetReachable) {
        if (tailnetReachable) {
          redirectTo(TAILNET_URL);
          return;
        }

        redirectTo(FUNNEL_URL);
      });
    });
  </script>
</body>
</html>
